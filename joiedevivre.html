<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joie de vivre - Detail</title>
    <link rel="stylesheet" type="text/css" href="./detail-style.css?v=1.1">
</head>
<body>

    <div class="container">
        <a href="Français.html" class="back-button">
            <img src="https://img.icons8.com/m_sharp/50/D63D42/left.png" width="30" alt="뒤로가기">
        </a>

        <h1 class="word-title">Joie de vivre</h1>

        <div class="pronunciation-container">
            <img src="https://img.icons8.com/m_sharp/50/D63D42/speaker.png" 
                 class="speaker-icon" 
                 onclick="playAudio()" 
                 alt="소리 듣기">
            <span class="phonetic">[ʒwa də vivʁ]</span>
        </div>

        <div class="content">
            <p class="definition">
                A deep enjoyment of life; <br> 
                an energetic happiness about living.
            </p>
            
            <p class="example">
                Her laughter and constant curiosity showed a true 
                <span class="highlight">joie de vivre.</span>
            </p>
        </div>
    </div>

    <audio id="wordAudio" src="F_second_sound.mp3"></audio>

    <script>
        function playAudio() {
            const audio = document.getElementById('wordAudio');
            if (audio) {
                // 오디오 재생 시도
                audio.play().catch(e => {
                    console.log("재생 오류:", e);
                    alert("음성 파일을 찾을 수 없거나 재생에 실패했습니다. 파일명이 F_second_sound.mp3 가 맞는지 확인해주세요!");
                });
            }
        }
    </script>
</body>
</html>
